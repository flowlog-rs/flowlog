[workspace]
members = [
    "crates/catalog",
    "crates/common",
    "crates/compiler",
    "crates/optimizer",
    "crates/parser",
    "crates/planner",
    "crates/profiler",
    "crates/stratifier"
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Nemo Yu"]
license = "MIT"

[workspace.dependencies]
clap = "4.5"
itertools = "0.14"
prettyplease = "0.2"
proc-macro2 = "1.0"
quote = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
syn = "2.0"
toml_edit = "0.25"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-test = "0.2"
