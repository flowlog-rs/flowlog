[workspace]
changelog_update = true
git_release_enable = true
git_tag_enable = true

[[package]]
name = "flowlog-runtime"

[[package]]
name = "flowlog-build"

[[package]]
name = "flowlog-compiler"
# Mirrors `publish = false` in Cargo.toml — not a crates.io crate.
publish = false
# release-compiler.yml already creates the flowlog-compiler-vX.Y.Z tag and
# attaches Linux/macOS/Windows binaries, so release-plz must not also tag
# or open a GitHub Release for this crate.
git_tag_enable = false
git_release_enable = false
