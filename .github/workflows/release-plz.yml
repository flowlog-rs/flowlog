name: release-plz

# Replaces the older release-crates.yml. release-plz watches main, opens a
# "chore: release" PR with the version bumps + changelog updates, and on
# merge of that PR publishes flowlog-runtime / flowlog-build to crates.io
# in dependency order (waiting for the index between publishes).
#
# flowlog-compiler is publish=false; release-compiler.yml still handles its
# tag + cross-platform binary uploads.

on:
  push:
    branches: [main]

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plz-pr:
    name: Open / update Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 🤖 release-plz (release-pr)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          # Must be a PAT (or GitHub App token), not GITHUB_TOKEN, so that
          # the release PR triggers downstream CI (ci.yml) on its own pushes.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    name: Publish on release PR merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Install protobuf-compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: 🚀 release-plz (release)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
