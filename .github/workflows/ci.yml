name: CI

on:
  push:
    branches: ["main", "main-next"]
  pull_request:
    branches: ["main", "main-next"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: ⚙️ Install protobuf-compiler + bsdmainutils
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler bsdmainutils

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 💾 Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: 📎 Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: 🧪 Unit tests
        run: cargo test

      - name: 🏁 End-to-end fixture tests
        run: |
          bash tests/fixtures/run_compiler.sh -j 4
          bash tests/fixtures/run_lib.sh -j 4

  fmt:
    name: 🎨 rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Nightly: rustfmt.toml uses group_imports / imports_granularity,
      # which are nightly-only options.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all --check

  deny:
    name: 🛡️ cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  typos:
    name: 📝 typos (spell check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@v1.47.2

  lint-toml:
    name: 🧹 taplo (TOML format + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ⬇️ Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/download/0.10.0/taplo-linux-x86_64.gz \
            | gunzip | sudo tee /usr/local/bin/taplo > /dev/null
          sudo chmod +x /usr/local/bin/taplo
          taplo --version
      - name: 🎨 taplo fmt --check
        run: taplo fmt --check --diff
      - name: 🔍 taplo lint
        run: taplo lint
