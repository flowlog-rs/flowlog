name: CI

on:
  push:
    branches: ["main", "main-next"]
  pull_request:
    branches: ["main", "main-next"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ⚙️ Install protobuf-compiler + bsdmainutils
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler bsdmainutils

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 💾 Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: 📎 Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: 🧪 Unit tests
        run: cargo test

      - name: 🏁 End-to-end fixture tests
        run: |
          bash tests/fixtures/run_compiler.sh -j 4
          bash tests/fixtures/run_lib.sh -j 4

  deny:
    name: 🛡️ cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  typos:
    name: 📝 typos (spell check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.47.2
