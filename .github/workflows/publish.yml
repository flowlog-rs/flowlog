name: Publish to crates.io

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler jq

      - name: 📦 Publish flowlog-runtime (if version bumped)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: ./.github/scripts/publish-crate.sh flowlog-runtime crates/flowlog-runtime

      - name: 📦 Publish flowlog-build (if version bumped)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: ./.github/scripts/publish-crate.sh flowlog-build crates/flowlog-build
