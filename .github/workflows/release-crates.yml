name: Release crates

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Install protobuf-compiler and jq
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler jq

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: 📦 Publish flowlog-runtime
        run: ./.github/scripts/publish-crate.sh flowlog-runtime crates/flowlog-runtime

      - name: 📦 Publish flowlog-build
        run: ./.github/scripts/publish-crate.sh flowlog-build crates/flowlog-build
